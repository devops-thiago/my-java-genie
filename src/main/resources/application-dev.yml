# Development Configuration for Java RAG System
# This profile uses self-hosted models (Ollama) and local ChromaDB

spring:
  application:
    name: java-rag-system-dev

# Model Configuration - Self-Hosted (Ollama)
model:
  provider: self-hosted
  
  self-hosted:
    base-url: http://localhost:11434
    model-name: llama2
    timeout-seconds: 60
  
  # Lower temperature for more deterministic responses during development
  temperature: 0.5
  max-tokens: 500

# Vector Database Configuration - Local ChromaDB
vector-db:
  type: chroma
  connection-url: http://localhost:8000
  collection-name: java25_docs_dev
  
  chroma:
    tenant: default_tenant
    database: default_database

# Document Ingestion Configuration
ingestion:
  # Smaller chunks for faster development iteration
  chunk-size: 800
  chunk-overlap: 150
  batch-size: 50
  supported-formats:
    - md
    - html
    - txt

# Query Configuration
query:
  max-retrieved-chunks: 5
  similarity-threshold: 0.65
  timeout-seconds: 15
  enable-cache: true
  cache-ttl-minutes: 30

# Embedding Model Configuration - Local Model
embedding:
  model-type: local
  local-model-name: all-minilm-l6-v2
  dimensions: 384

# Logging Configuration - Verbose for Development
logging:
  level:
    root: INFO
    com.javarag: DEBUG
    com.javarag.service: DEBUG
    com.javarag.repository: DEBUG
    com.javarag.controller: DEBUG
    com.javarag.config: DEBUG
    dev.langchain4j: INFO
    org.springframework: INFO
    org.springframework.web: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %highlight(%-5level) %cyan(%logger{36}) - %msg%n"
  file:
    name: logs/java-rag-system-dev.log
    max-size: 10MB
    max-history: 7

# Server Configuration
server:
  port: 8080
  error:
    include-message: always
    include-stacktrace: always

# Spring Boot Actuator Configuration
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,env,loggers
      base-path: /actuator
  endpoint:
    health:
      show-details: always
      show-components: always

# Application Info
info:
  app:
    name: Java RAG System (Development)
    description: RAG system for Java 25 documentation - Development Environment
    version: 1.0.0-SNAPSHOT
    environment: development

# Development Mode Features
rag:
  dev-mode:
    enabled: true
