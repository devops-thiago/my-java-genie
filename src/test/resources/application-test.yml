spring:
  application:
    name: java-rag-system-test

# Test configuration with minimal settings
model:
  provider: self-hosted
  self-hosted:
    base-url: http://localhost:11434
    model-name: llama2
  temperature: 0.7
  max-tokens: 500

vector-db:
  type: chroma
  connection-url: http://localhost:8000
  collection-name: java25_docs_test

ingestion:
  chunk-size: 500
  chunk-overlap: 100
  batch-size: 10

query:
  max-retrieved-chunks: 3
  similarity-threshold: 0.7
  timeout-seconds: 5

embedding:
  model-type: local
  local-model-name: all-minilm-l6-v2
  dimensions: 384

logging:
  level:
    com.javarag: DEBUG
