services:
  chromadb:
    image: chromadb/chroma:1.5.9
    container_name: my-java-genie-chromadb
    ports:
      - "8000:8000"
    volumes:
      # Chroma 1.x persists to /data (configured in the image's /config.yaml).
      - chroma-data:/data
    healthcheck:
      test: ["CMD-SHELL", "timeout 2 bash -c '</dev/tcp/localhost/8000' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  chroma-data:
