# Docker Compose configuration for Java RAG System
# For detailed documentation, see docs/DOCKER.md

services:
  # ChromaDB Vector Database
  chromadb:
    image: chromadb/chroma:1.5.9
    container_name: java-rag-chromadb
    ports:
      - "8000:8000"
    volumes:
      # Chroma 1.x persists to /data (configured in the image's /config.yaml).
      - chroma-data:/data
    networks:
      - rag-network
    healthcheck:
      test: ["CMD-SHELL", "timeout 2 bash -c '</dev/tcp/localhost/8000' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Ollama Self-Hosted Language Model
  ollama:
    image: ollama/ollama:latest
    container_name: java-rag-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - rag-network
    healthcheck:
      test: ["CMD-SHELL", "/bin/ollama ps || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    # Uncomment the deploy section below if you have NVIDIA GPU support
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  # Java RAG Application
  java-rag-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: java-rag-application
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - VECTOR_DB_URL=http://chromadb:8000
      - MODEL_BASE_URL=http://ollama:11434
      - MODEL_NAME=llama3.2:1b
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://alloy:4317
      - OPENTELEMETRY_ENABLED=true
      # The custom OpenTelemetry SDK exports to these per-signal endpoints (Alloy).
      - OPENTELEMETRY_TRACES_ENDPOINT=http://alloy:4317
      - OPENTELEMETRY_METRICS_ENDPOINT=http://alloy:4317
      - OPENTELEMETRY_LOGS_ENDPOINT=http://alloy:4317
      - ENVIRONMENT=docker
    volumes:
      - ./docs:/app/docs:ro
      - app-logs:/app/logs
    networks:
      - rag-network
    depends_on:
      chromadb:
        condition: service_healthy
      ollama:
        condition: service_healthy
      alloy:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Grafana Alloy (OpenTelemetry Collector)
  alloy:
    image: grafana/alloy:latest
    container_name: java-rag-alloy
    command:
      - run
      - --server.http.listen-addr=0.0.0.0:12345
      - --storage.path=/var/lib/alloy/data
      - /etc/alloy/config.alloy
    volumes:
      - ./alloy-config.alloy:/etc/alloy/config.alloy
      - alloy-data:/var/lib/alloy/data
    ports:
      - "4317:4317"   # OTLP gRPC receiver
      - "4318:4318"   # OTLP HTTP receiver
      - "12345:12345" # Alloy UI
    networks:
      - rag-network
    depends_on:
      - tempo
      - mimir
      - loki

  # Grafana Tempo for Distributed Tracing
  tempo:
    image: grafana/tempo:2.6.1
    container_name: java-rag-tempo
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./tempo-config.yaml:/etc/tempo.yaml
      - tempo-data:/var/tempo
    ports:
      - "3200:3200"   # Tempo HTTP
      - "4317"        # OTLP gRPC (internal)
    networks:
      - rag-network

  # Grafana Mimir for Metrics Storage
  mimir:
    image: grafana/mimir:latest
    container_name: java-rag-mimir
    command: ["-config.file=/etc/mimir.yaml"]
    volumes:
      - ./mimir-config.yaml:/etc/mimir.yaml
      - mimir-data:/data
    ports:
      - "9009:9009"   # Mimir HTTP
    networks:
      - rag-network

  # Grafana Loki for Log Aggregation
  loki:
    image: grafana/loki:latest
    container_name: java-rag-loki
    command: ["-config.file=/etc/loki/local-config.yaml"]
    volumes:
      - ./loki-config.yaml:/etc/loki/local-config.yaml
      - loki-data:/loki
    ports:
      - "3100:3100"   # Loki HTTP
    networks:
      - rag-network

  # Grafana for Unified Dashboards
  grafana:
    image: grafana/grafana:latest
    container_name: java-rag-grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    networks:
      - rag-network
    depends_on:
      - tempo
      - mimir
      - loki

networks:
  rag-network:
    driver: bridge

volumes:
  chroma-data:
    driver: local
  ollama-data:
    driver: local
  app-logs:
    driver: local
  alloy-data:
    driver: local
  tempo-data:
    driver: local
  mimir-data:
    driver: local
  loki-data:
    driver: local
  grafana-data:
    driver: local
